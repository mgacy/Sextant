name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - 'main'

jobs:
  test:
    name: Test
    if: github.event.pull_request.merged == true && github.head_ref == 'release'
    uses: ./.github/workflows/test.yml

  build-macos:
    name: Build macOS Binary
    if: github.event.pull_request.merged == true && github.head_ref == 'release'
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build -c release

      - name: Verify executable
        run: .build/release/sextant --version

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp .build/release/sextant dist/sextant-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-binaries
          path: dist/sextant-macos-arm64
          retention-days: 1

  release:
    name: Release
    if: github.event.pull_request.merged == true && github.head_ref == 'release'
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Get version
        id: get-version
        shell: bash
        run: |
          set -eo pipefail
          VERSION=$(grep -oE '"[0-9]+\.[0-9]+\.[0-9]+"' Sources/sextant/Version.swift | tr -d '"' | head -1)
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from Version.swift"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-binaries
          path: dist

      - name: Verify artifacts
        run: test -f dist/sextant-macos-arm64

      - name: Generate checksums
        run: |
          set -eo pipefail
          cd dist
          sha256sum sextant-* > SHA256SUMS
          test -s SHA256SUMS

      - name: Push tag
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const sha = '${{ github.event.pull_request.merge_commit_sha }}' || '${{ github.sha }}';
            if (!version || !sha) {
              core.setFailed(`Missing version ("${version}") or SHA ("${sha}")`);
              return;
            }
            const tag = `refs/tags/${version}`;
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: tag,
                sha: sha
              });
              core.info(`Created tag ${tag} at ${sha}`);
            } catch (error) {
              if (error.status === 422) {
                core.warning(`Tag ${tag} already exists. Verifying it points to ${sha}...`);
                const { data: ref } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${version}`
                });
                if (ref.object.sha !== sha) {
                  core.setFailed(`Tag ${tag} exists but points to ${ref.object.sha}, not ${sha}`);
                }
              } else {
                throw error;
              }
            }

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/sextant-macos-arm64
            dist/SHA256SUMS
