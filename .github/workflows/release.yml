name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - 'main'

jobs:
  test:
    name: Test
    if: github.event.pull_request.merged == true && github.head_ref == 'release'
    uses: ./.github/workflows/test.yml

  build-macos:
    name: Build macOS Binary
    runs-on: macos-15
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2'

      - name: Build
        run: swift build -c release

      - name: Verify executable
        run: .build/release/sextant --version

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp .build/release/sextant dist/sextant-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-binaries
          path: dist/sextant-macos-arm64
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Get version
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -Eo '[0-9]+\.[0-9]+\.[0-9]+' Sources/sextant/Version.swift)
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract version from Version.swift"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-binaries
          path: dist

      - name: Verify artifacts
        run: test -f dist/sextant-macos-arm64

      - name: Generate checksums
        run: |
          cd dist
          sha256sum sextant-* > SHA256SUMS

      - name: Push tag
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.get-version.outputs.version }}',
              sha: '${{ github.event.pull_request.merge_commit_sha }}'
            })

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get-version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/sextant-macos-arm64
            dist/SHA256SUMS
