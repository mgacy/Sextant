name: Prepare Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Type of release
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    name: Prepare Release
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: '6.2'

      - name: Bump Version file
        id: bump
        run: |
          set -eo pipefail
          NEW_VERSION=$(swift package --allow-writing-to-package-directory version-file --target sextant --bump ${{ inputs.release_type }})
          if [ -z "$NEW_VERSION" ]; then
            echo "::error::version-file plugin returned empty output"
            exit 1
          fi
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: Bump Version.swift -> ${{ steps.bump.outputs.version }}
          committer: GitHub <noreply@github.com>
          author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          branch: release
          delete-branch: true
          title: '[CI] Prepare Version ${{ steps.bump.outputs.version }} Release'
          body: |
            Update `Version.swift` with bumped version number.
          add-paths: Sources/sextant/Version.swift
          labels: ci
          draft: false
